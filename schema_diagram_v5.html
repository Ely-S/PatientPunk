<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schema Diagram v5</title>
<style>
  body { margin: 0; padding: 16px; font-family: sans-serif; background: white; }
  svg { width: 100%; height: auto; display: block; }
  .t   { font-family: sans-serif; font-size: 14px; fill: #3d3d3a; }
  .ts  { font-family: sans-serif; font-size: 12px; fill: #5f5e5a; }
  .th  { font-family: sans-serif; font-size: 14px; font-weight: 500; fill: #3d3d3a; }
  .c-teal rect   { fill: #E1F5EE; stroke: #0F6E56; }
  .c-teal text   { fill: #085041; }
  .c-teal line   { stroke: #0F6E56; }
  .c-gray rect   { fill: #F1EFE8; stroke: #5F5E5A; }
  .c-gray text   { fill: #444441; }
  .c-gray line   { stroke: #5F5E5A; }
  .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
  .c-purple text { fill: #3C3489; }
  .c-purple line { stroke: #534AB7; }
  .layer-bg { fill: #f8f7f4; stroke: #b4b2a9; }
  .layer-lbl { font-family: sans-serif; font-size: 12px; fill: #5f5e5a; font-weight: 500; }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a18; }
    .t   { fill: #c2c0b6; }
    .ts  { fill: #9c9a92; }
    .th  { fill: #c2c0b6; }
    .c-teal rect   { fill: #085041; stroke: #5DCAA5; }
    .c-teal text   { fill: #9FE1CB; }
    .c-teal line   { stroke: #5DCAA5; }
    .c-gray rect   { fill: #444441; stroke: #B4B2A9; }
    .c-gray text   { fill: #D3D1C7; }
    .c-gray line   { stroke: #B4B2A9; }
    .c-purple rect { fill: #3C3489; stroke: #AFA9EC; }
    .c-purple text { fill: #CECBF6; }
    .c-purple line { stroke: #AFA9EC; }
    .layer-bg  { fill: #2c2c2a; stroke: #5f5e5a; }
    .layer-lbl { fill: #9c9a92; }
  }
</style>
</head>

<line x1="260" y1="128" x2="308" y2="128" stroke="#1D9E75" stroke-width="0.5" marker-end="url(#arrow)"/>

</g>

<g class="c-gray">

  <text class="th" x="170" y="580" text-anchor="middle" dominant-baseline="central">user_profiles</text>

</g>

<g class="c-purple">
  <rect x="370" y="556" width="250" height="176" rx="8" stroke-width="0.5"/>
  <text class="th" x="495" y="580" text-anchor="middle" dominant-baseline="central">treatment_reports</text>
  <line x1="370" y1="592" x2="620" y2="592" stroke-width="0.5"/>
  <text class="ts" x="382" y="610" dominant-baseline="central">report_id  PK</text>

</g>

<g class="c-purple">
  <rect x="60" y="736" width="560" height="156" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="760" text-anchor="middle" dominant-baseline="central">conditions</text>
  <line x1="60" y1="772" x2="620" y2="772" stroke-width="0.5"/>
  <text class="ts" x="72" y="790" dominant-baseline="central">condition_id  PK</text>
  <text class="ts" x="72" y="810" dominant-baseline="central">run_id · user_id · post_id  FK</text>
  <text class="ts" x="72" y="830" dominant-baseline="central">condition_type · condition_name · diagnosed_at · resolved_at · severity</text>
</g>
