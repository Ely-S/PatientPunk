[project]
name = "patientpunk"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "anthropic>=0.18.0",
    "python-dotenv>=1.0",
    "requests>=2.32",
    "scipy>=1.12",
    "pandas>=2.1",
    "statsmodels>=0.14",
    "lifelines>=0.29",
    "pydantic>=2.5",
    "causalinference>=0.1",
    "pingouin>=0.6",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
]
ui = [
    "streamlit>=1.30",
    "plotly>=5.18",
]

[tool.pytest.ini_options]
testpaths = ["variable_extraction/tests", "tests"]
